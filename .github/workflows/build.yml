name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev automake autopoint gettext
        pip install --upgrade pip
        pip install buildozer cython==0.29.33

    - name: Build with Buildozer
      run: |
        # Ensure Android SDK licenses are accepted automatically
        mkdir -p ~/.android && touch ~/.android/repositories.cfg
        
        # 1. Trigger SDK download and setup
        buildozer android sdk
        
        # 2. Find and accept licenses explicitly
        # We find all sdkmanager instances and pipe 'yes' to --licenses
        find ~/.buildozer/android/platform/ -name "sdkmanager" -exec bash -c 'yes | {} --licenses' \; || true
        
        # 3. Final build with 'yes' pipe to handle any remaining prompts
        yes | buildozer android debug
      env:
        BUILDOZER_ALLOW_ORG_NAME_AS_PACKAGE_NAME: 1
        BUILDOZER_WARN_ON_ROOT: 1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
