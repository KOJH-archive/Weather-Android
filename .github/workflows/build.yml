name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git unzip xz-utils zip libglu1-mesa ninja-build pkg-config

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install flet requests flet-geolocator

      - name: Build APK with Flet
        run: |
          export GRADLE_OPTS="-Xmx2048m -Dorg.gradle.daemon=false"
          flet build apk -vv --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: weather-insight-apk
          path: build/apk/*.apk
