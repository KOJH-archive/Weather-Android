name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git unzip xz-utils zip libglu1-mesa ninja-build pkg-config

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install flet httpx python-dotenv

      - name: Create .env file for API Key
        run: |
          echo "DATA_GO_KR_API_KEY=15e5470c1c9af84143de1f691a1621d5786beb1fb07f3e3990f912ce044723a9" > .env

      - name: Build APK with Flet
        run: |
          export GRADLE_OPTS="-Xmx2048m -Dorg.gradle.daemon=false"
          flet build apk --module-name android_main -vv --yes

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: weather-insight-apk
          path: build/apk/*.apk
