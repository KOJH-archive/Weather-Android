name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev
          pip install --upgrade pip
          pip install buildozer flet

      - name: Build with Buildozer
        run: |
          # Buildozer needs a local SDK/NDK setup which can be slow. 
          # Using a dedicated action might be faster, but this is the transparent way.
          # We'll use the 'yes' command to accept licenses.
          yes | buildozer android debug
        env:
          # Buildozer needs several environment variables and tools
          # Some might be pre-installed on ubuntu-latest
          BUILD_ANDROID_SDK: 33
          BUILD_ANDROID_NDK: 25.2.9519653

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: weather-insight-apk
          path: bin/*.apk
