name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libsqlite3-dev libffi-dev libssl-dev cmake autoconf automake libtool pkg-config unzip zip
          pip install --upgrade pip
          pip install buildozer cython==0.29.37 flet

      - name: Build with Buildozer
        run: |
          # We'll use the 'yes' command to accept licenses.
          yes | buildozer android debug
        env:
          BUILD_ANDROID_SDK: 33
          BUILD_ANDROID_NDK: 25.2.9519653

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: weather-insight-apk
          path: bin/*.apk
